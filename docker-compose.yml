services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - seq
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=todoapp;Username=todoapp;Password=todoapp_dev
      - Serilog__WriteTo__2__Name=Seq
      - Serilog__WriteTo__2__Args__serverUrl=http://seq:5341
      - ConnectionStrings__Redis=redis:6379
      - Otel__Endpoint=http://otel-collector:4317

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=todoapp
      - POSTGRES_USER=todoapp
      - POSTGRES_PASSWORD=todoapp_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  seq:
    image: datalust/seq:latest
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      - ACCEPT_EULA=Y

volumes:
  postgres_data:
  redis_data:
